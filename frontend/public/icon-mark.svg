<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Taskly icon">
  <defs>
    <linearGradient id="im-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="45%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <radialGradient id="im-glow" cx="32%" cy="26%" r="62%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3730a3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="im-bolt" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.88"/>
    </linearGradient>
    <!-- Outer glow -->
    <filter id="im-outer" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.5"/>
    </filter>
    <!-- Inner bolt glow -->
    <filter id="im-bolt-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="62" height="62" rx="18" fill="url(#im-bg)" filter="url(#im-outer)"/>
  <!-- Radial glow overlay -->
  <rect x="1" y="1" width="62" height="62" rx="18" fill="url(#im-glow)"/>
  <!-- Glass top highlight -->
  <rect x="2" y="2" width="60" height="28" rx="17" fill="white" fill-opacity="0.09"/>
  <!-- Subtle bottom shadow inset -->
  <rect x="2" y="36" width="60" height="26" rx="17" fill="black" fill-opacity="0.06"/>
  <!-- Border ring -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="17.5" stroke="white" stroke-opacity="0.22" stroke-width="1"/>

  <!-- Lightning bolt — large, centered, clean -->
  <path
    d="M37 7L19 34H30L24 57L45 30H34L37 7Z"
    fill="url(#im-bolt)"
    filter="url(#im-bolt-glow)"
    stroke="white" stroke-opacity="0.08" stroke-width="0.5" stroke-linejoin="round"
  />
</svg>
