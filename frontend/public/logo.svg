<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none" role="img" aria-label="Taskly">
  <defs>
    <!-- Icon gradient: indigo → violet -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- Bolt fill gradient -->
    <linearGradient id="boltGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.85"/>
    </linearGradient>

    <!-- Subtle inner glow on icon bg -->
    <radialGradient id="bgGlow" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#4f46e5" flood-opacity="0.45"/>
    </filter>

    <!-- Subtle text shadow -->
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ICON MARK                                   -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Outer rounded square background -->
  <rect x="1" y="1" width="50" height="50" rx="14" fill="url(#iconGrad)" filter="url(#iconShadow)"/>

  <!-- Inner glow overlay -->
  <rect x="1" y="1" width="50" height="50" rx="14" fill="url(#bgGlow)"/>

  <!-- Top-edge highlight (glass rim) -->
  <rect x="2" y="2" width="48" height="22" rx="13" fill="white" fill-opacity="0.07"/>

  <!-- Border ring -->
  <rect x="1.5" y="1.5" width="49" height="49" rx="13.5" stroke="white" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Lightning bolt icon — clean, geometric, centered -->
  <!-- Upper-left triangle of bolt -->
  <path
    d="M30.5 7L17 27.5H26.5L21.5 45L36 24.5H26.5L30.5 7Z"
    fill="url(#boltGrad)"
    stroke="white"
    stroke-opacity="0.12"
    stroke-width="0.5"
    stroke-linejoin="round"
  />

  <!-- ═══════════════════════════════════════════ -->
  <!-- WORDMARK                                    -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- "Taskly" — Inter-style, tight tracking, premium weight -->
  <text
    x="66"
    y="34"
    font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="24"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#f0f4ff"
    filter="url(#textGlow)"
  >Taskly</text>

  <!-- Accent dot on the "i" — replaced by a subtle underline accent bar -->
  <rect x="66" y="42" width="58" height="2" rx="1" fill="url(#iconGrad)" opacity="0.5"/>
</svg>
