<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Taskly icon">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bolt" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#4f46e5" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="9" fill="url(#fg)" filter="url(#sh)"/>
  <!-- Glow overlay -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="9" fill="url(#glow)"/>
  <!-- Glass top highlight -->
  <rect x="1" y="1" width="30" height="14" rx="8.5" fill="white" fill-opacity="0.09"/>
  <!-- Border -->
  <rect x="1" y="1" width="30" height="30" rx="8.5" stroke="white" stroke-opacity="0.2" stroke-width="0.75"/>

  <!-- Lightning bolt — clean geometric, centered in 32×32 -->
  <path
    d="M19.5 4.5L10.5 17.5H16.5L13 27.5L22.5 14.5H16.5L19.5 4.5Z"
    fill="url(#bolt)"
    stroke="white"
    stroke-opacity="0.1"
    stroke-width="0.4"
    stroke-linejoin="round"
  />
</svg>
